baseURL = "http://seokbeomKim.github.io"
languageCode = "en-us"
title = "A Developer's Note"
theme = "pickles"

[params]
	paginate = 5
	subtitle = "Technical Writing in Daily Life"

	# Socal accounts
	github = "seokbeomKim"
	linkedin = "sukbeomkim"

[[menu.main]]
	name = "Blog"
	url = "/"
	weight = 1

[[menu.main]]
	name = "Tags"
	url = "/tags"
	weight = 2

[[menu.main]]
	name = "Categories"
	url = "/categories"
	weight = 3

[[menu.main]]
	name = "About"
	url = "/about"


[markup]
	defaultMarkdownHandler = "goldmark"

	[markup.tableOfContents]
		endLevel = 3
		ordered = true 
		startLevel = 2

[taxonomies]
	category = "categories"
	tags = "tags"

[related]
	threshold = 80
	
	[[related.indices]]
		name = "keywords"
		weight = 150
	[[related.indices]]
		name  = "author"
		toLower = true
		weight = 30
	[[related.indices]]
		name  = "tags"
		weight = 100
	[[related.indices]]
		name  = "date"
		weight = 10
		pattern = "2017"
